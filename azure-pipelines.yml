# --------- DEVELOPMENT STAGE -------- #
# ------------------------------------ #

# --------- Pull Upstream to Bovey Dev -------- #

# - script: ./.ci/deploy/pantheon/dev
#   displayName: 'Deploy to Pantheon Bovey dev'
#   condition: succeeded()

# --------- Install Frontend Tools -------- #

- script: ./.ci/env/set
  workingDirectory: $(_gatsby_folder)
  displayName: 'Initialize frontend build tools'
  condition: succeeded()

- script: 'npm install --only=dev gatsby-cli'
  workingDirectory: $(_gatsby_folder)
  displayName: 'Install Gatsby-CLI'
  condition: succeeded()

- task: Npm@1
  displayName: 'NPM install'
  condition: succeeded()
  inputs:
    workingDir: $(_gatsby_folder)
    verbose: false

# --------- Prep variables for Dev -------- #

############## IMPORTANT!! #######
# If using pipeline for real, change _env variable from "solo" to "dev"
# You can then remove the "solougconthubrg" (and all its contents) from Azure portal
#####################

- bash: |
    echo "##vso[task.setvariable variable=_gatsby_source]dev"
    echo "##vso[task.setvariable variable=_env]solo"
  displayName: '[dev] Set environment variables'
  condition: succeeded()

- bash: |
    echo "##vso[task.setvariable variable=_pantheonsitelabel]$(PantheonSiteLabel)"
    echo "##vso[task.setvariable variable=_rg_name]$(_env)$(_site)rg"
    echo "##vso[task.setvariable variable=_storage_name]$(_env)$(_site)storage"
    echo "##vso[task.setvariable variable=_cdn_name]$(_env)$(_site)cdn"
    echo "##vso[task.setvariable variable=_endpoint_name]$(_env)$(_site)endpoint"
  displayName: '[dev] Set Azure deploy variables'
  condition: succeeded()

# ----- Retrieve caches ----- #

- task: CacheBeta@1
  inputs:
    key: 'gatsby_cache | "$(Agent.OS)" | "$(Build.SourceBranch)" | "$(_env)" | "$(_site)" | "$(_zone)"'
    path: $(_gatsby_cache_folder)
  displayName: '[dev] Retrieve cached Gatsby .cache folder'

- task: CacheBeta@1
  inputs:
    key: 'gatsby_public | "$(Agent.OS)" | "$(Build.SourceBranch)" | "$(_env)" | "$(_site)" | "$(_zone)"'
    path: $(_gatsby_public_folder)
  displayName: '[dev] Retrieve cached Gatsby public folder'


# --------- Build Gatsby using Bovey Dev as source -------- #

- script: |
    npx gatsby build --prefix-paths
  workingDirectory: $(_gatsby_folder)
  displayName: '[dev] Gatsby build (Dev)'
  condition: succeeded()

# --------- Deploy Gatsby site to Dev -------- #

- task: "AzureResourceGroupDeployment@2"
  displayName: '[dev] Create or update resource group'
  inputs:
    azureSubscription: '$(_service_connection)'
    action: 'Create Or Update Resource Group'
    resourceGroupName: '$(_rg_name)'
    location: 'East US'
    templateLocation: 'Linked artifact'
    csmFile: '$(_gatsby_folder)/azuredeploy.json'
    overrideParameters: '-env $(_env) -site $(_site) -zone $(_zone) -pantheonsitelabel $(_pantheonsitelabel)'
    deploymentMode: 'Complete'
    deploymentOutputs: 'outputConnectionString'

- task: AzureCLI@1
  displayName: '[dev] Enable custom https using CDN Managed certificate'
  inputs:
    azureSubscription: '$(_service_connection)'
    scriptLocation: 'inlineScript'
    inlineScript: |
      _zone_name=`echo $(_zone) | sed 's/\./\-/'`
      https_exists=`az cdn custom-domain show --endpoint-name $(_endpoint_name) -n $(_env)$(_site)-$_zone_name --profile-name $(_cdn_name) -g $(_rg_name) | jq '.customHttpsProvisioningState' -r`

      if [ $https_exists == "Enabled" ]; then
        echo "##[DEBUG] Custom https already enabled."
      else
        echo "##[DEBUG] Setting up custom https. If this step fails, you can manually enable Custom HTTPS for $(_endpoint_name) on the portal.azure.com dashboard."
        az cdn custom-domain enable-https --endpoint-name $(_endpoint_name) -n $(_env)$(_site)-$_zone_name --profile-name $(_cdn_name) -g $(_rg_name)
      fi

- pwsh: |
    $outputs = ConvertFrom-Json '$(outputConnectionString)'
    foreach ($output in $outputs.PSObject.Properties) {
          Write-Host "##vso[task.setvariable variable=_connectionstring]$($output.Value.value)"
    }
  displayName: '[dev] Output parsed connection string'

- task: AzureCLI@1
  displayName: '[dev] Enable static-website for storage account and set index to index.html'
  inputs:
    azureSubscription: '$(_service_connection)'
    scriptLocation: 'inlineScript'
    inlineScript: 'az storage blob service-properties update --account-name ''$(_storage_name)'' --static-website  --index-document index.html'

- task: AzureCLI@1
  displayName: '[dev] Upload storage content to static site'
  inputs:
    azureSubscription: '$(_service_connection)'
    scriptLocation: 'inlineScript'
    inlineScript: 'az storage blob sync -s ''$(_gatsby_public_folder)'' -c ''$web'' --connection-string ''$(_connectionstring)'''

- task: AzureCLI@1
  displayName: '[dev] Purge the site cache'
  inputs:
    azureSubscription: '$(_service_connection)'
    scriptLocation: 'inlineScript'
    inlineScript: 'az cdn endpoint purge -g $(_rg_name) -n $(_endpoint_name) --profile-name $(_cdn_name) --content-paths "/*" --no-wait'

