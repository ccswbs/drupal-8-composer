# ------------------------------------------- #
# ------------- PUBLISH ARTIFACT ------------ #
# ------------------------------------------- #

- task: ArchiveFiles@2
  displayName: 'Archive $(Build.SourcesDirectory)/$(_gatsby_public_folder)'
  inputs:
    rootFolderOrFile: '$(Build.SourcesDirectory)/$(_gatsby_public_folder)'
    includeRootFolder: false

- task: PublishBuildArtifacts@1
  displayName: Publish Build Artifact
  inputs:
    pathtoPublish: '$(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip'
    artifactName: gatsby_build_artifact


# --------- Clean up -------- #

- script: ./.ci/env/clean
  displayName: 'Clean up build environment'
  condition: always()
