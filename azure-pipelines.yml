# Build, test, and deploy the content hub.
# See: https://docs.microsoft.com/azure/devops/pipelines/languages/php
#=========================================================================
# In addition to the environment variables defined in this file, also
# add the following variables in the Azure Pipelines UI.
#
# See: https://docs.microsoft.com/en-us/azure/devops/pipelines/process/variables
#
#   terminus.site: Drupal site for running Selenium tests
#   test.site.username: Username for logging into Drupal site (secret)
#   test.site.password: Password for logging into Drupal site (secret)
#
# Under variable groups, create a variable group called "ugconthub-gatsby-variables"
#
#   PantheonSiteLabel: Affiliated Pantheon site e.g. "bovey"
#   ServiceConnection: Our Azure service connection (set up on Azure)
#   Site: Affiliated Front-end site e.g. ugconthub
#   Zone: Affiliated domain zone e.g. uoguelph.dev
#   terminus.token: The Pantheon machine token
#
#=========================================================================

variables:
  phpVersion: 7.2
  TestQAUsername: $(test.site.username)
  TestQAPassword: $(test.site.password)
  _service_connection: $(ServiceConnection)
  _gatsby_folder: '.ci/gus'
  _gatsby_cache_folder: '.ci/gus/.cache'
  _gatsby_public_folder: '.ci/gus/public'
  _site: $(Site)
  _zone: $(Zone)

trigger:
- develop

pr:
- develop
- master

pool:
  vmImage: 'Ubuntu 16.04'

steps:

- checkout: self
  submodules: true
  persistCredentials: true

# --------- Install Tools -------- #

- script: ./.ci/env/set
  displayName: 'Install backend build tools'

- script: ./.ci/env/set-tests
  displayName: 'Install backend test tools'

# --------- Install Drupal -------- #

- script: ./.ci/build/php
  displayName: 'Install Drupal with composer'

